spring.application.name=users-api

server.port=8080


#-----H2 Database-------
spring.datasource.url=jdbc:h2:mem:oauth2db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#----console------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


#---JWT--------
#   15 min
#   7 days
app.jwt.secret=5A7134743777217A25432A46294A404E635266556A586E327235753878
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

#----OAUTH2 REDIRECT-----
app.auth2.redirect-uri=http://localhost:3000/oauth2/callback

# ── OAUTH2 SOCIAL LOGIN ───────────────────────────────────────────

spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# ── OAUTH2 REDIRECT ───────────────────────────────────────────────
app.oauth2.redirect-uri=http://localhost:3000/oauth2/callback
